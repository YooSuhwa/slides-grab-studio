<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pack Gallery - slides-grab-studio</title>
  <link rel="icon" type="image/png" href="/asset/buddy_logo_round.png">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap">
  <link rel="stylesheet" href="/gallery.css">
  <script>(function(){var t=localStorage.getItem('sg-theme');if(t)document.documentElement.setAttribute('data-theme',t);else if(window.matchMedia('(prefers-color-scheme: light)').matches)document.documentElement.setAttribute('data-theme','light')})();</script>
  <style>
    /* ── Gallery Grid ── */
    .gallery-grid-new {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
      gap: 16px;
      padding: 0;
    }

    /* ── Card ── */
    .pack-card {
      background: var(--card-bg, #1a1a1f);
      border: 1px solid var(--card-border, rgba(255,255,255,0.08));
      border-radius: 12px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .pack-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.4);
    }

    /* ── Preview area ── */
    .preview {
      position: relative;
      overflow: hidden;
      height: 130px;
      border-radius: 12px 12px 0 0;
    }
    .preview .el {
      position: absolute;
    }

    /* ── Card info ── */
    .pack-info {
      padding: 12px 14px 14px;
    }
    .pack-number {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      color: var(--text-muted, #666);
      letter-spacing: 1px;
      margin-bottom: 2px;
    }
    .pack-name {
      font-size: 14px;
      font-weight: 700;
      color: var(--text-primary, #fff);
      margin: 0 0 4px 0;
      letter-spacing: 0.3px;
    }
    .pack-desc {
      font-size: 12px;
      color: var(--text-muted, #888);
      line-height: 1.5;
      margin: 0 0 10px 0;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .pack-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }
    .pack-tag {
      font-family: 'Space Mono', monospace;
      font-size: 9px;
      letter-spacing: 0.5px;
      padding: 2px 8px;
      border: 1px solid var(--tag-border, rgba(255,255,255,0.15));
      border-radius: 3px;
      color: var(--text-muted, #888);
      text-transform: lowercase;
    }

    /* ── Light theme overrides ── */
    [data-theme="light"] .pack-card {
      --card-bg: #ffffff;
      --card-border: rgba(0,0,0,0.08);
    }
    [data-theme="light"] .pack-card:hover {
      box-shadow: 0 16px 48px rgba(0,0,0,0.12);
    }
    [data-theme="light"] .pack-name { --text-primary: #111; }
    [data-theme="light"] .pack-desc { --text-muted: #666; }
    [data-theme="light"] .pack-number { --text-muted: #999; }
    [data-theme="light"] .pack-tag { --tag-border: rgba(0,0,0,0.12); --text-muted: #666; }

    /* ── Loading ── */
    .gallery-loading {
      grid-column: 1 / -1;
      text-align: center;
      padding: 60px 0;
      color: var(--text-muted, #888);
    }
  </style>
</head>
<body>
  <div class="gallery-container">
    <div class="nav-bar">
      <a class="nav-brand" href="/">
        <img class="logo-dark" src="/asset/buddy_logo_round(dark).png" alt="">
        <img class="logo-light" src="/asset/buddy_logo_round(light).png" alt="">
        <span class="nav-brand-text">slides-grab<span>-studio</span></span>
      </a>
      <div class="nav-spacer"></div>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme" aria-label="Toggle light/dark mode">
        <svg class="theme-icon theme-icon-moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="theme-icon theme-icon-sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
      </button>
    </div>

    <div class="gallery-header">
      <h1>Design Packs</h1>
      <p class="gallery-subtitle">31 unique visual styles for your presentations</p>
    </div>

    <div class="gallery-grid-new" id="gallery-grid">
      <div class="gallery-loading">
        <div class="loading-spinner"></div>
        Loading packs...
      </div>
    </div>
  </div>

  <script type="module">
    const grid = document.getElementById('gallery-grid');

    async function loadGallery() {
      try {
        const res = await fetch('/api/packs');
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const packs = await res.json();

        // Sort by order from pack.json
        packs.sort((a, b) => (a.order || 999) - (b.order || 999));

        // Load all preview CSS files
        const cssPromises = packs.map(p =>
          fetch(`/api/packs/${encodeURIComponent(p.id)}/preview.css`)
            .then(r => r.ok ? r.text() : '')
            .catch(() => '')
        );
        const cssTexts = await Promise.all(cssPromises);

        // Inject all preview CSS into a single style tag
        const styleEl = document.createElement('style');
        styleEl.textContent = cssTexts.filter(Boolean).join('\n');
        document.head.appendChild(styleEl);

        renderGallery(packs);
      } catch (err) {
        grid.innerHTML = `<div class="gallery-loading"><p>Failed to load packs: ${err.message}</p></div>`;
      }
    }

    function renderGallery(packs) {
      grid.innerHTML = '';

      packs.forEach((pack, idx) => {
        const card = document.createElement('div');
        card.className = 'pack-card';
        card.setAttribute('role', 'button');
        card.setAttribute('tabindex', '0');

        // Preview
        const preview = document.createElement('div');
        preview.className = `preview preview-${pack.id}`;
        preview.innerHTML = '<div class="el el-1"></div><div class="el el-2"></div><div class="el el-3"></div>';

        // Info
        const info = document.createElement('div');
        info.className = 'pack-info';

        const number = document.createElement('div');
        number.className = 'pack-number';
        number.textContent = String(idx + 1).padStart(2, '0') + ' —';

        const name = document.createElement('h3');
        name.className = 'pack-name';
        name.textContent = pack.name || pack.id;

        const desc = document.createElement('p');
        desc.className = 'pack-desc';
        desc.textContent = pack.bestFor || '';

        const tags = document.createElement('div');
        tags.className = 'pack-tags';
        const moods = pack.mood || [];
        moods.slice(0, 4).forEach(m => {
          const tag = document.createElement('span');
          tag.className = 'pack-tag';
          tag.textContent = m;
          tags.appendChild(tag);
        });

        info.append(number, name);
        if (desc.textContent) info.appendChild(desc);
        if (moods.length) info.appendChild(tags);

        card.append(preview, info);

        // Click → select pack and go to editor
        card.addEventListener('click', () => {
          window.location.href = `/?pack=${encodeURIComponent(pack.id)}`;
        });
        card.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' || e.key === ' ') {
            e.preventDefault();
            window.location.href = `/?pack=${encodeURIComponent(pack.id)}`;
          }
        });

        grid.appendChild(card);
      });
    }

    await loadGallery();

    // Theme toggle
    document.getElementById('theme-toggle').addEventListener('click', () => {
      const next = document.documentElement.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', next);
      localStorage.setItem('sg-theme', next);
    });
    window.matchMedia('(prefers-color-scheme: light)').addEventListener('change', (e) => {
      if (!localStorage.getItem('sg-theme')) {
        document.documentElement.setAttribute('data-theme', e.matches ? 'light' : 'dark');
      }
    });
  </script>
</body>
</html>
