<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>

    .slide {
      display: grid;
      grid-template-columns: 292pt 1fr;
      gap: 28pt;
      align-items: center;
      padding-top: 34pt;
      padding-right: 46pt;
    }
    .visual-wrap {
      position: relative;
      height: 280pt;
    }
    .blob {
      position: absolute;
      left: -28pt;
      top: 30pt;
      width: 198pt;
      height: 198pt;
      border-radius: 50%;
      background: radial-gradient(circle at 58% 44%, rgba(255,255,255,0.82) 0 42%, rgba(255,255,255,0.12) 43% 74%, rgba(255,255,255,0) 75%);
    }
    .visual {
      position: absolute;
      inset: 0 24pt 16pt 0;
      border-radius: 38pt;
    }
    .copy {
      position: relative;
      padding-top: 10pt;
      padding-bottom: 32pt;
      z-index: 1;
    }
    .copy::after {
      content: "";
      position: absolute;
      left: 160pt;
      top: 68pt;
      width: 82pt;
      height: 82pt;
      border-radius: 50%;
      background: radial-gradient(circle at 50% 50%, rgba(242,208,51,0.96) 0 68%, rgba(242,208,51,0.0) 69%);
      z-index: -1;
    }
    .micro {
      font-size: 9pt;
      color: var(--text-primary);
      letter-spacing: 0.26em;
      margin-bottom: 18pt;
    }
    .title {
      max-width: 270pt;
      font-size: 33pt;
      font-weight: 520;
      line-height: 1.02;
      margin-bottom: 12pt;
    }
    .body {
      max-width: 212pt;
      font-size: 11.2pt;
      line-height: 1.48;
    }

  </style>
</head>
<body class="light">

  <div class="slide">
    <div class="visual-wrap">
      <div class="blob"></div>
      <div class="media-frame visual" data-image-placeholder data-slot="image"></div>
    </div>
    <div class="copy">
      <p class="micro" data-slot="label">•••</p>
      <h1 class="title" data-slot="title">The Digital Marketing Agency <span class="accent-word">For Creatives!</span></h1>
      <p class="body" data-slot="body">Lorem ipsum dolor sit amet, adipiscing elit. Aenean commodo ligula eget dolor.</p>
    </div>
    
    <div class="deck-footer" aria-hidden="true">
      <div class="year-stack">
        <p>20</p>
        <p>25</p>
      </div>
      <div class="brand-copy">
        <p class="brand-name">Real Balance Presentation</p>
        <p class="brand-site">www.website.com</p>
      </div>
    </div>

    <p class="page-number" data-slot="page-number">2</p>
  </div>

</body>
</html>
