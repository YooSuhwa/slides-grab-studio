<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>

    .slide {
      display: grid;
      grid-template-columns: 308pt 1fr;
      gap: 30pt;
      align-items: center;
      padding-top: 30pt;
    }
    .media-stack {
      position: relative;
      height: 278pt;
      padding-left: 34pt;
      padding-bottom: 12pt;
    }
    .ghost-1,
    .ghost-2 {
      position: absolute;
      border-radius: 28pt;
      border: 1.2pt solid rgba(241, 220, 115, 0.34);
      background: rgba(255,255,255,0.12);
      bottom: 18pt;
      left: 6pt;
      width: 210pt;
      height: 206pt;
    }
    .ghost-2 {
      left: 18pt;
      bottom: 6pt;
    }
    .main-visual {
      position: absolute;
      left: 30pt;
      top: 0;
      width: 286pt;
      height: 262pt;
    }
    .icon-badge {
      position: absolute;
      left: 0;
      top: 40pt;
      width: 34pt;
      height: 58pt;
      border-radius: 16pt;
      background: var(--accent);
      box-shadow: var(--shadow-glow);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 4;
    }
    .icon-badge p {
      color: var(--surface-dark);
      font-size: 14pt;
      line-height: 1;
    }
    .copy {
      padding-top: 6pt;
      z-index: 2;
    }
    .title {
      font-size: 34pt;
      max-width: 180pt;
      margin-bottom: 12pt;
    }
    .body {
      max-width: 200pt;
      font-size: 11pt;
      line-height: 1.48;
      margin-bottom: 22pt;
    }
    .cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12pt;
      width: 282pt;
    }
    .mini-card {
      min-height: 118pt;
      padding: 16pt 16pt 14pt;
      border-radius: 24pt;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .mini-card .mini-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8pt;
    }
    .mini-card .mini-top p {
      color: inherit;
      font-size: 9pt;
      line-height: 1;
    }
    .mini-card h3 {
      font-size: 18pt;
      line-height: 1.14;
      color: inherit;
    }
    .mini-card .mini-body {
      font-size: 10pt;
      line-height: 1.42;
      color: inherit;
      opacity: 0.92;
    }
    .card-accent .mini-body,
    .card-accent h3 {
      color: var(--text-on-accent);
    }
    .card-dark h3,
    .card-dark .mini-body,
    .card-dark .mini-top p {
      color: var(--text-on-dark);
    }
    .round-button {
      width: 28pt;
      height: 28pt;
      border-radius: 50%;
      background: rgba(47,47,47,0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-card);
    }
    .round-button p {
      font-size: 12pt;
      line-height: 1;
      color: var(--accent);
    }

  </style>
</head>
<body class="light">

  <div class="slide">
    <div class="media-stack">
      <div class="ghost-1"></div>
      <div class="ghost-2"></div>
      <div class="icon-badge" aria-hidden="true"><p>☁</p></div>
      <div class="media-frame main-visual" data-image-placeholder data-slot="image"></div>
    </div>
    <div class="copy">
      <h1 class="title" data-slot="title">Great performance</h1>
      <p class="body" data-slot="body">Lorem ipsum dolor sit amet. We will be there in every online format you need.</p>
      <div class="cards">
        <div class="mini-card card card-accent">
          <div class="mini-top">
            <p data-slot="label">Feature</p>
            <p aria-hidden="true">•••</p>
          </div>
          <h3 data-slot="card-title">We will there online format</h3>
          <p class="mini-body" data-slot="card-body">Bring to the table win-win proactive domination.</p>
          <div class="round-button" aria-hidden="true"><p>→</p></div>
        </div>
        <div class="mini-card card card-dark">
          <div class="mini-top">
            <p data-slot="label-2">Growth</p>
            <p aria-hidden="true">↗</p>
          </div>
          <h3 data-slot="metric">+210%</h3>
          <p class="mini-body" data-slot="caption">Growth of solar</p>
        </div>
      </div>
    </div>
    
    <div class="deck-footer" aria-hidden="true">
      <div class="year-stack">
        <p>20</p>
        <p>25</p>
      </div>
      <div class="brand-copy">
        <p class="brand-name">Real Balance Presentation</p>
        <p class="brand-site">www.website.com</p>
      </div>
    </div>

    <p class="page-number" data-slot="page-number">4</p>
  </div>

</body>
</html>
