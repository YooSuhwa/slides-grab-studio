<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>

    .slide {
      padding-top: 34pt;
    }
    .eyebrow-title {
      font-size: 11pt;
      color: var(--text-primary);
      margin-bottom: 10pt;
    }
    .title {
      font-size: 42pt;
      line-height: 0.98;
      margin-bottom: 18pt;
      max-width: 240pt;
    }
    .bubbles {
      position: relative;
      height: 182pt;
      margin-left: 56pt;
    }
    .bubble {
      position: absolute;
      border-radius: 50%;
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18pt;
    }
    .bubble p {
      color: inherit;
    }
    .bubble .head {
      font-size: 18pt;
      line-height: 1.08;
      margin-bottom: 6pt;
    }
    .bubble .sub {
      font-size: 10.6pt;
      line-height: 1.2;
      opacity: 0.95;
    }
    .strength {
      left: 0;
      top: 42pt;
      width: 146pt;
      height: 146pt;
      background: radial-gradient(circle at 40% 36%, rgba(255,255,255,0.56) 0 18%, rgba(255,255,255,0.10) 19% 44%, rgba(255,255,255,0) 45% 100%), var(--accent);
    }
    .weakness {
      left: 126pt;
      top: 18pt;
      width: 154pt;
      height: 154pt;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.14) 0 22%, rgba(255,255,255,0.0) 23% 100%), var(--surface-dark);
      color: var(--text-on-dark);
    }
    .opportunity {
      left: 246pt;
      top: -4pt;
      width: 150pt;
      height: 150pt;
      background: rgba(255,255,255,0.54);
    }
    .threat {
      left: 390pt;
      top: 64pt;
      width: 136pt;
      height: 136pt;
      background: rgba(255,255,255,0.48);
    }
    .body {
      max-width: 186pt;
      margin-left: 252pt;
      margin-top: 12pt;
      font-size: 11.2pt;
      line-height: 1.48;
    }

  </style>
</head>
<body class="light">

  <div class="slide">
    <p class="eyebrow-title" data-slot="label">SWOT slide</p>
    <h1 class="title" data-slot="title">The problem?</h1>

    <div class="bubbles">
      <div class="bubble strength">
        <p class="head" data-slot="item-1-title">Strength</p>
        <p class="sub" data-slot="item-1-body">Process one</p>
      </div>
      <div class="bubble weakness">
        <p class="head" data-slot="item-2-title">Weakness</p>
        <p class="sub" data-slot="item-2-body">Process two</p>
      </div>
      <div class="bubble opportunity">
        <p class="head" data-slot="item-3-title">Opportunity</p>
        <p class="sub" data-slot="item-3-body">Process three</p>
      </div>
      <div class="bubble threat">
        <p class="head" data-slot="item-4-title">Threat</p>
        <p class="sub" data-slot="item-4-body">Process three</p>
      </div>
    </div>

    <p class="body" data-slot="body">A wonderful serenity has taken possession of my entire soul, like these sweet mornings.</p>

    
    <div class="deck-footer" aria-hidden="true">
      <div class="year-stack">
        <p>20</p>
        <p>25</p>
      </div>
      <div class="brand-copy">
        <p class="brand-name">Real Balance Presentation</p>
        <p class="brand-site">www.website.com</p>
      </div>
    </div>

    <p class="page-number" data-slot="page-number">11</p>
  </div>

</body>
</html>
