<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>

    .slide {
      padding: 0;
      background: linear-gradient(180deg, rgba(29,29,29,0.99), rgba(35,35,35,1));
    }
    .arrow {
      position: absolute;
      left: 32pt;
      top: 28pt;
    }
    .arrow p {
      color: var(--accent);
      font-size: 22pt;
      line-height: 1;
    }
    .copy {
      position: absolute;
      left: 44pt;
      top: 118pt;
      width: 230pt;
    }
    .copy .metric {
      font-size: 42pt;
      line-height: 1;
      color: var(--accent);
      margin-bottom: 18pt;
    }
    .copy .body {
      max-width: 152pt;
      font-size: 12pt;
      line-height: 1.52;
      color: var(--text-on-dark);
    }
    .map {
      position: absolute;
      right: 52pt;
      top: 56pt;
      width: 282pt;
      height: 176pt;
      opacity: 0.28;
      background:
        radial-gradient(circle, rgba(255,255,255,0.42) 0 2pt, rgba(255,255,255,0) 3pt) 0 0 / 12pt 12pt;
      clip-path: polygon(2% 46%, 18% 24%, 34% 18%, 44% 10%, 56% 20%, 72% 12%, 86% 22%, 96% 34%, 92% 56%, 100% 72%, 84% 86%, 54% 84%, 34% 92%, 16% 82%, 8% 64%);
    }
    .pin {
      position: absolute;
      right: 168pt;
      top: 74pt;
      width: 104pt;
      height: 142pt;
    }
    .pin-shape {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 50% 34%, rgba(255,255,255,0.26), rgba(255,255,255,0) 52%);
      clip-path: path('M52 0 C80 0 102 22 102 50 C102 80 73 99 52 142 C31 99 2 80 2 50 C2 22 24 0 52 0 Z');
    }
    .pin-inner {
      position: absolute;
      left: 17pt;
      top: 18pt;
      width: 70pt;
      height: 70pt;
      border-radius: 50%;
      background: radial-gradient(circle at 40% 36%, rgba(255,255,255,0.62) 0 22%, rgba(255,255,255,0.12) 23% 48%, rgba(255,255,255,0) 49% 100%), var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-glow);
    }
    .pin-inner p {
      color: var(--surface-dark);
      font-size: 24pt;
      line-height: 1;
    }
    .locator {
      position: absolute;
      left: 18pt;
      right: 18pt;
      bottom: 22pt;
      height: 96pt;
      border-radius: 24pt;
      overflow: hidden;
      box-shadow: var(--shadow-soft);
    }
    .locator-top {
      height: 38pt;
      background: var(--accent);
      display: flex;
      align-items: center;
      padding: 0 24pt;
    }
    .locator-top p {
      color: var(--text-primary);
      font-size: 14pt;
      line-height: 1;
    }
    .locator-bottom {
      height: 58pt;
      background: var(--bg-primary);
      display: flex;
      align-items: center;
      padding: 0 24pt;
    }
    .locator-bottom p {
      color: var(--text-secondary);
      font-size: 13pt;
      line-height: 1;
    }

  </style>
</head>
<body class="dark">

  <div class="slide">
    <div class="arrow" aria-hidden="true"><p>→</p></div>

    <div class="copy">
      <p class="metric" data-slot="metric">236,92</p>
      <p class="body" data-slot="body">Lorem ipsum dolor sit amet. Qui sint neque a velit. Non qui consequatur.</p>
    </div>

    <div class="map" aria-hidden="true"></div>
    <div class="pin">
      <div class="pin-shape" aria-hidden="true"></div>
      <div class="pin-inner"><p aria-hidden="true">👤</p></div>
    </div>

    <div class="locator">
      <div class="locator-top"><p data-slot="label">World maps</p></div>
      <div class="locator-bottom"><p data-slot="caption">Pin location</p></div>
    </div>

    
    <div class="deck-footer" aria-hidden="true">
      <div class="year-stack">
        <p>20</p>
        <p>25</p>
      </div>
      <div class="brand-copy">
        <p class="brand-name">Real Balance Presentation</p>
        <p class="brand-site">www.website.com</p>
      </div>
    </div>

    <p class="page-number" data-slot="page-number">20</p>
  </div>

</body>
</html>
