<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>

    .slide {
      display: grid;
      grid-template-columns: 250pt 1fr;
      gap: 28pt;
      align-items: center;
      padding-top: 26pt;
      padding-left: 40pt;
      padding-right: 40pt;
    }
    .intro {
      position: relative;
      padding-left: 4pt;
      padding-bottom: 18pt;
    }
    .intro .eyebrow {
      margin-bottom: 18pt;
    }
    .intro .title {
      font-size: 52pt;
      line-height: 0.94;
      margin-bottom: 8pt;
    }
    .year-row {
      display: flex;
      align-items: center;
      gap: 12pt;
    }
    .year-row .line {
      width: 90pt;
      height: 2pt;
      background: rgba(242,208,51,0.74);
      border-radius: 999pt;
    }
    .year-row .year {
      font-size: 18pt;
      color: var(--text-primary);
    }
    .year-row .btn {
      width: 26pt;
      height: 26pt;
      border-radius: 50%;
      background: var(--surface-pill-dark);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-card);
    }
    .year-row .btn p {
      color: var(--accent);
      font-size: 12pt;
      line-height: 1;
    }
    .panel {
      min-height: 300pt;
      border-radius: 38pt;
      padding: 28pt 34pt 22pt;
      background: var(--accent);
      box-shadow: var(--shadow-glow);
      position: relative;
    }
    .panel-title {
      font-size: 24pt;
      color: var(--text-primary);
      margin-bottom: 22pt;
    }
    .panel-arrow {
      position: absolute;
      right: 24pt;
      top: 24pt;
    }
    .panel-arrow p {
      font-size: 16pt;
      color: var(--text-primary);
      line-height: 1;
    }
    .agenda {
      display: flex;
      flex-direction: column;
      gap: 18pt;
    }
    .agenda-item {
      display: grid;
      grid-template-columns: 112pt 1fr;
      gap: 18pt;
      align-items: center;
    }
    .date-pill {
      min-height: 40pt;
      border-radius: 999pt;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-card);
    }
    .date-pill.dark { background: var(--surface-pill-dark); }
    .date-pill.light { background: rgba(255,255,255,0.92); }
    .date-pill p {
      color: var(--text-on-dark);
      font-size: 14pt;
      line-height: 1;
    }
    .date-pill.light p { color: var(--accent-dark); }
    .agenda-item .text {
      font-size: 13pt;
      color: var(--text-primary);
      line-height: 1.3;
    }

  </style>
</head>
<body class="light">

  <div class="slide">
    <div class="intro">
      <div class="eyebrow"><span class="eyebrow-dot" aria-hidden="true"></span><p data-slot="label">Real it!</p></div>
      <h1 class="title" data-slot="title">Agenda</h1>
      <div class="year-row">
        <div class="line" aria-hidden="true"></div>
        <p class="year" data-slot="subtitle">2025</p>
        <div class="btn" aria-hidden="true"><p>→</p></div>
      </div>
    </div>

    <div class="panel">
      <div class="panel-arrow" aria-hidden="true"><p>→</p></div>
      <p class="panel-title" data-slot="panel-title">Into the agenda</p>

      <div class="agenda">
        <div class="agenda-item">
          <div class="date-pill dark"><p data-slot="date-1">14/07/25</p></div>
          <p class="text" data-slot="item-1-title">Meet in canivars, London</p>
        </div>
        <div class="agenda-item">
          <div class="date-pill light"><p data-slot="date-2">17/07/25</p></div>
          <p class="text" data-slot="item-2-title">Meet in canivars, London</p>
        </div>
        <div class="agenda-item">
          <div class="date-pill dark"><p data-slot="date-3">03/08/25</p></div>
          <p class="text" data-slot="item-3-title">Meet in canivars, London</p>
        </div>
        <div class="agenda-item">
          <div class="date-pill dark"><p data-slot="date-4">18/10/25</p></div>
          <p class="text" data-slot="item-4-title">Meet in canivars, London</p>
        </div>
      </div>
    </div>

    
    <div class="deck-footer" aria-hidden="true">
      <div class="year-stack">
        <p>20</p>
        <p>25</p>
      </div>
      <div class="brand-copy">
        <p class="brand-name">Real Balance Presentation</p>
        <p class="brand-site">www.website.com</p>
      </div>
    </div>

    <p class="page-number" data-slot="page-number">12</p>
  </div>

</body>
</html>
