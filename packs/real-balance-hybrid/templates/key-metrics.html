<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>

    .slide {
      display: grid;
      grid-template-columns: 278pt 1fr;
      gap: 34pt;
      align-items: center;
      padding-top: 26pt;
    }
    .metric-cluster {
      position: relative;
      height: 276pt;
      overflow: hidden;
    }
    .metric-tag {
      position: absolute;
      left: 86pt;
      top: 18pt;
      width: 42pt;
      height: 58pt;
      border-radius: 16pt;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-glow);
    }
    .metric-tag p {
      font-size: 16pt;
      line-height: 1;
      color: var(--surface-dark);
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      box-shadow: var(--shadow-soft);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 18pt;
    }
    .orb .num {
      font-size: 34pt;
      line-height: 1;
      color: var(--text-primary);
      margin-bottom: 8pt;
    }
    .orb .label {
      font-size: 14pt;
      line-height: 1.2;
      color: var(--text-primary);
    }
    .orb.large {
      left: 0;
      bottom: 0;
      width: 180pt;
      height: 180pt;
      background: radial-gradient(circle at 42% 34%, rgba(255,255,255,0.54) 0 18%, rgba(255,255,255,0.14) 19% 46%, rgba(255,255,255,0) 47% 100%), var(--accent);
    }
    .orb.mid {
      left: 108pt;
      top: 62pt;
      width: 136pt;
      height: 168pt;
      background: rgba(255,255,255,0.56);
    }
    .orb.small {
      left: 190pt;
      top: 144pt;
      width: 106pt;
      height: 126pt;
      background: rgba(255,255,255,0.46);
    }
    .copy {
      padding-top: 12pt;
    }
    .copy .micro {
      font-size: 10pt;
      letter-spacing: 0.18em;
      margin-bottom: 14pt;
      color: var(--text-primary);
    }
    .copy .title {
      max-width: 260pt;
      font-size: 34pt;
      line-height: 0.98;
      margin-bottom: 18pt;
    }
    .copy .body {
      max-width: 208pt;
      font-size: 11.2pt;
      line-height: 1.48;
      margin-bottom: 24pt;
    }
    .progress {
      width: 206pt;
    }
    .progress-head {
      display: flex;
      justify-content: space-between;
      margin-bottom: 8pt;
    }
    .progress-head p {
      font-size: 10.5pt;
      color: var(--text-primary);
    }
    .progress-track {
      height: 8pt;
      border-radius: 999pt;
      background: rgba(255,255,255,0.56);
      overflow: hidden;
      box-shadow: inset 0 0 0 1pt rgba(255,255,255,0.34);
    }
    .progress-fill {
      width: 78%;
      height: 100%;
      border-radius: inherit;
      background: var(--accent);
      box-shadow: var(--shadow-glow);
    }

  </style>
</head>
<body class="light">

  <div class="slide">
    <div class="metric-cluster">
      <div class="metric-tag" aria-hidden="true"><p>🏷</p></div>
      <div class="orb large">
        <p class="num" data-slot="metric">31,4M</p>
        <p class="label" data-slot="label">Million user</p>
      </div>
      <div class="orb mid">
        <p class="num" data-slot="metric-2">28,7</p>
        <p class="label" data-slot="label-2">Million user</p>
      </div>
      <div class="orb small">
        <p class="num" data-slot="metric-3">14,8</p>
        <p class="label" data-slot="label-3">Million user</p>
      </div>
    </div>

    <div class="copy">
      <p class="micro" data-slot="caption">•••</p>
      <h1 class="title" data-slot="title">The Digital Marketing Agency For Creatives<span class="accent-word">!</span></h1>
      <p class="body" data-slot="body">Lorem ipsum dolor sit amet, adipiscing elit. Aenean commodo ligula.</p>

      <div class="progress">
        <div class="progress-head">
          <p data-slot="progress-label">Percentage</p>
          <p data-slot="progress-value">80%</p>
        </div>
        <div class="progress-track">
          <div class="progress-fill"></div>
        </div>
      </div>
    </div>

    
    <div class="deck-footer" aria-hidden="true">
      <div class="year-stack">
        <p>20</p>
        <p>25</p>
      </div>
      <div class="brand-copy">
        <p class="brand-name">Real Balance Presentation</p>
        <p class="brand-site">www.website.com</p>
      </div>
    </div>

    <p class="page-number" data-slot="page-number">14</p>
  </div>

</body>
</html>
