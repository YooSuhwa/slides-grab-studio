<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>

    body::before { display: none; }
    .slide {
      background: linear-gradient(180deg, var(--bg-primary) 0 55%, var(--accent) 55% 100%);
      padding-top: 28pt;
    }
    .title {
      text-align: center;
      font-size: 30pt;
      margin-bottom: 18pt;
    }
    .stage {
      position: relative;
      height: 280pt;
    }
    .monitor {
      position: absolute;
      left: 210pt;
      top: 28pt;
      width: 214pt;
      height: 148pt;
      border-radius: 10pt;
      background: linear-gradient(180deg, #737373 0%, #5e5e5e 100%);
      box-shadow: var(--shadow-soft);
      padding: 10pt;
    }
    .screen {
      height: 100%;
      border-radius: 2pt;
      background: linear-gradient(135deg, rgba(242,208,51,0.92), rgba(255,232,130,0.72));
      position: relative;
      overflow: hidden;
    }
    .screen::before,
    .screen::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.34) 0 6%, rgba(255,255,255,0) 7% 100%),
        repeating-conic-gradient(from 0deg, rgba(84,55,0,0.18) 0 4deg, rgba(0,0,0,0) 4deg 12deg);
      opacity: 0.7;
    }
    .screen::after {
      width: 82%;
      height: 82%;
      left: 9%;
      top: 9%;
      border-radius: 50%;
      border: 1.5pt solid rgba(255,255,255,0.64);
      background: none;
    }
    .stand {
      position: absolute;
      left: 292pt;
      top: 177pt;
      width: 48pt;
      height: 56pt;
      background: linear-gradient(180deg, #6f6f6f, #505050);
      clip-path: polygon(36% 0, 64% 0, 76% 54%, 92% 100%, 8% 100%, 24% 54%);
    }
    .base {
      position: absolute;
      left: 272pt;
      top: 227pt;
      width: 88pt;
      height: 10pt;
      border-radius: 999pt 999pt 4pt 4pt;
      background: linear-gradient(180deg, #797979, #505050);
    }
    .chip {
      position: absolute;
      width: 52pt;
      height: 52pt;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: var(--shadow-card);
      font-size: 20pt;
      line-height: 1;
      font-weight: 700;
    }
    .chip p { color: inherit; font-size: 20pt; font-weight: 700; line-height: 1; }
    .chip-dark { background: var(--surface-dark); color: var(--accent); }
    .chip-light { background: rgba(255,255,255,0.88); color: var(--text-primary); }
    .chip-yellow { background: var(--accent); color: var(--surface-dark); }
    .chip-1 { left: 170pt; top: 8pt; }
    .chip-2 { left: 44pt; top: 94pt; }
    .chip-3 { left: 424pt; top: 8pt; }
    .chip-4 { left: 444pt; top: 180pt; }
    .chip-5 { left: 244pt; top: 210pt; }
    .stat-left,
    .stat-right {
      position: absolute;
      width: 126pt;
    }
    .stat-left {
      left: 54pt;
      top: 196pt;
      text-align: center;
    }
    .stat-right {
      right: 20pt;
      top: 176pt;
    }
    .stat-value {
      font-size: 20pt;
      color: var(--text-primary);
      margin-bottom: 6pt;
      line-height: 1;
    }
    .stat-label {
      font-size: 12pt;
      color: #4f4f4f;
      margin-bottom: 10pt;
      line-height: 1.2;
    }
    .stat-right .stat-value {
      font-size: 16pt;
      margin-bottom: 4pt;
    }
    .stat-right .stat-label {
      font-size: 18pt;
      margin-bottom: 6pt;
    }
    .stat-copy {
      font-size: 10pt;
      line-height: 1.45;
      color: #545454;
      max-width: 120pt;
    }

  </style>
</head>
<body class="light">

  <div class="slide">
    <h1 class="title" data-slot="title">Awesome our social media</h1>
    <div class="stage">
      <div class="monitor">
        <div class="screen" data-image-placeholder data-slot="image"></div>
      </div>
      <div class="stand"></div>
      <div class="base"></div>

      <div class="chip chip-dark chip-1"><p aria-hidden="true">◔</p></div>
      <div class="chip chip-light chip-2"><p aria-hidden="true">t</p></div>
      <div class="chip chip-light chip-3"><p aria-hidden="true">f</p></div>
      <div class="chip chip-dark chip-4"><p aria-hidden="true">▶</p></div>
      <div class="chip chip-yellow chip-5"><p aria-hidden="true">p</p></div>

      <div class="stat-left">
        <p class="stat-value" data-slot="metric">1.800K</p>
        <p class="stat-label" data-slot="label">Tweet</p>
      </div>

      <div class="stat-right">
        <p class="stat-value" data-slot="metric-2">▲ 2728k</p>
        <p class="stat-label" data-slot="subtitle">Youtube Subscribe</p>
        <p class="stat-label" data-slot="caption">Your statement</p>
        <p class="stat-copy" data-slot="body">A wonderful serenity has taken possession of my entire.</p>
      </div>
    </div>
    
    <div class="deck-footer" aria-hidden="true">
      <div class="year-stack">
        <p>20</p>
        <p>25</p>
      </div>
      <div class="brand-copy">
        <p class="brand-name">Real Balance Presentation</p>
        <p class="brand-site">www.website.com</p>
      </div>
    </div>

    <p class="page-number" data-slot="page-number">18</p>
  </div>

</body>
</html>
