<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>

    .slide {
      padding-top: 34pt;
      padding-left: 42pt;
      padding-right: 42pt;
    }
    .title-wrap {
      position: absolute;
      left: 36pt;
      bottom: 54pt;
      width: 216pt;
      z-index: 4;
    }
    .title-wrap .glow-orb {
      width: 120pt;
      height: 120pt;
      left: -22pt;
      top: -8pt;
      opacity: 0.92;
    }
    .title {
      position: relative;
      z-index: 2;
      font-size: 32pt;
      line-height: 0.96;
    }
    .meta {
      position: absolute;
      left: 420pt;
      top: 54pt;
      width: 210pt;
    }
    .meta .date {
      font-size: 16pt;
      line-height: 1.1;
      color: var(--text-primary);
      margin-bottom: 10pt;
    }
    .meta .body {
      font-size: 11pt;
      line-height: 1.48;
      max-width: 200pt;
    }
    .chip {
      position: absolute;
      border-radius: 20pt;
      overflow: hidden;
      box-shadow: var(--shadow-card);
      background: linear-gradient(135deg, rgba(255,255,255,0.94), rgba(230,229,224,0.88));
    }
    .chip::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 58% 28%, rgba(242,208,51,0.62), rgba(242,208,51,0) 34%),
        linear-gradient(145deg, rgba(255,255,255,0.2), rgba(255,255,255,0));
    }
    .chip-1 { left: 250pt; top: 26pt; width: 62pt; height: 76pt; border-radius: 18pt; }
    .chip-2 { left: 176pt; top: 106pt; width: 68pt; height: 92pt; border-radius: 24pt; }
    .chip-3 { left: 254pt; top: 104pt; width: 128pt; height: 164pt; border-radius: 34pt; }
    .chip-4 { left: 404pt; top: 164pt; width: 140pt; height: 172pt; border-radius: 30pt; }
    .chip-5 { left: 560pt; top: 220pt; width: 68pt; height: 92pt; border-radius: 24pt; }
    .chip-6 { left: 508pt; top: 258pt; width: 62pt; height: 78pt; border-radius: 18pt; }
    .chip-7 { left: 610pt; top: 176pt; width: 34pt; height: 46pt; border-radius: 14pt; background: var(--accent); }
    .chip-7::before { background: none; }
    .chip p {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(50,50,50,0.4);
      font-size: 10pt;
      line-height: 1;
    }

  </style>
</head>
<body class="light">

  <div class="slide">
    <div class="title-wrap">
      <div class="glow-orb"></div>
      <h1 class="title" data-slot="title">2025 Images gallery</h1>
    </div>

    <div class="meta">
      <p class="date" data-slot="subtitle">11/04/2025 Type</p>
      <p class="body" data-slot="body">Lorem ipsum dolor sit amet. Qui sint neque a velit modi quo numquam.</p>
    </div>

    <div class="chip chip-1" data-image-placeholder data-slot="image-1"><p>1</p></div>
    <div class="chip chip-2" data-image-placeholder data-slot="image-2"><p>2</p></div>
    <div class="chip chip-3" data-image-placeholder data-slot="image-3"><p>3</p></div>
    <div class="chip chip-4" data-image-placeholder data-slot="image-4"><p>4</p></div>
    <div class="chip chip-5" data-image-placeholder data-slot="image-5"><p>5</p></div>
    <div class="chip chip-6" data-image-placeholder data-slot="image-6"><p>6</p></div>
    <div class="chip chip-7" aria-hidden="true"><p>▣</p></div>

    
    <div class="deck-footer" aria-hidden="true">
      <div class="year-stack">
        <p>20</p>
        <p>25</p>
      </div>
      <div class="brand-copy">
        <p class="brand-name">Real Balance Presentation</p>
        <p class="brand-site">www.website.com</p>
      </div>
    </div>

    <p class="page-number" data-slot="page-number">5</p>
  </div>

</body>
</html>
