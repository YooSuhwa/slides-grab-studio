<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f8fafc;
    --bg-elevated: #f1f5f9;
    --text-primary: #1e293b;
    --text-secondary: #64748b;
    --accent: #2563eb;
    --border: #e2e8f0;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: var(--bg-primary);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 60pt 80pt;
    position: relative;
  }
  .label {
    font-size: 10pt;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 1.5pt;
    text-transform: uppercase;
    margin-bottom: 16pt;
  }
  .stat {
    font-size: 72pt;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -3pt;
    line-height: 1;
    margin-bottom: 8pt;
  }
  .stat-unit {
    font-size: 28pt;
    font-weight: 600;
    color: var(--accent);
    opacity: 0.7;
  }
  h2 {
    font-size: 18pt;
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.3pt;
    margin-bottom: 10pt;
    margin-top: 16pt;
  }
  p {
    font-size: 12pt;
    color: var(--text-secondary);
    line-height: 1.6;
    max-width: 380pt;
    font-weight: 400;
  }
  .divider {
    width: 40pt;
    height: 2pt;
    background: var(--border);
    border-radius: 1pt;
    margin: 14pt 0;
  }
</style>
</head>
<body>
  <span class="label">Key Metric</span>
  <div>
    <span class="stat">3.2</span><span class="stat-unit">x</span>
  </div>
  <div class="divider"></div>
  <h2>Revenue Growth YoY</h2>
  <p>Our strategic initiatives have driven sustained growth, outperforming the industry average by a significant margin.</p>
</body>
</html>
