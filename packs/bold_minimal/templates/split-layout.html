<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="base.css">
  <style>
    .split-container {
      display: flex;
      flex: 1;
      gap: 32pt;
      align-items: center;
      margin-top: 16pt;
      margin-bottom: 24pt;
    }
    .split-text {
      flex: 1;
    }
    .split-visual {
      flex: 1;
      display: flex;
      justify-content: flex-end;
      height: 100%;
    }
    .phone-mockup {
      width: 160pt;
      height: 280pt;
      border: 6pt solid var(--border-color);
      border-radius: 24pt;
      background-color: var(--bg-secondary);
      position: relative;
      overflow: hidden;
      box-shadow: 0 4pt 12pt rgba(0,0,0,0.05);
    }
    .phone-notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 60pt;
      height: 12pt;
      background-color: var(--border-color);
      border-bottom-left-radius: 8pt;
      border-bottom-right-radius: 8pt;
      z-index: 2;
    }
    .mockup-inner {
      width: 100%;
      height: 100%;
      background-image: repeating-conic-gradient(#f3f4f6 0% 25%, #e5e7eb 0% 50%);
      background-size: 20pt 20pt;
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="slide-label" data-slot="label">OUR PRODUCT</div>
    <div class="split-container">
      <div class="split-text">
        <h2 class="slide-title" data-slot="title">Here's a preview of our product</h2>
        <p class="slide-body" data-slot="body">Support your visuals with a bit of context, then link away to relevant Figma files, product docs, etc. Better yet, paste in a Figma prototype for that wow factor.</p>
      </div>
      <div class="split-visual">
        <div class="phone-mockup">
          <div class="phone-notch"></div>
          <div class="mockup-inner" data-slot="image"></div>
        </div>
      </div>
    </div>
    <div class="slide-footer">
      <div class="badge dark" data-slot="company">COMPANY NAME</div>
      <div class="badge" data-slot="footer-tag">CONFIDENTIAL</div>
    </div>
  </div>
</body>
</html>
