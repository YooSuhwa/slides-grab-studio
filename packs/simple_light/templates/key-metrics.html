<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --font-sans: 'Pretendard', -apple-system, sans-serif;
    --title-hero: 48pt;
    --title-section: 32pt;
    --title-slide: 24pt;
    --text-subtitle: 16pt;
    --text-body: 14pt;
    --text-caption: 11pt;
    --text-label: 10pt;
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: var(--font-sans);
    background: var(--bg-primary);
    padding: 48pt 64pt;
    display: flex;
    flex-direction: row;
    align-items: center;
  }
  .left {
    flex: 0 0 40%;
    display: flex;
    align-items: center;
    padding-right: 32pt;
  }
  .right {
    flex: 1;
  }
  h2 {
    font-size: var(--title-slide);
    font-weight: 700;
    color: var(--text-primary);
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .metrics {
    display: flex;
    flex-direction: column;
    gap: 24pt;
  }
  .metric {
    display: flex;
    flex-direction: row;
    align-items: baseline;
    gap: 16pt;
  }
  .metric .number {
    font-size: 28pt;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.02em;
    line-height: 1.0;
    flex-shrink: 0;
    min-width: 72pt;
  }
  .metric-info h3 {
    font-size: var(--text-label);
    font-weight: 600;
    color: var(--text-primary);
    letter-spacing: 0.02em;
    margin-bottom: 4pt;
  }
  .metric-info p {
    font-size: var(--text-caption);
    line-height: 1.6;
    color: var(--text-secondary);
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>
  <div class="left">
    <h2>Key Metrics</h2>
  </div>
  <div class="right">
    <div class="metrics">
      <div class="metric">
        <div class="number">XX%</div>
        <div class="metric-info">
          <h3>Metric 1</h3>
          <p>Add a description or highlight changes</p>
        </div>
      </div>
      <div class="metric">
        <div class="number">XX%</div>
        <div class="metric-info">
          <h3>Metric 2</h3>
          <p>Add a description or highlight changes</p>
        </div>
      </div>
      <div class="metric">
        <div class="number">XX%</div>
        <div class="metric-info">
          <h3>Metric 3</h3>
          <p>Add a description or highlight changes</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
