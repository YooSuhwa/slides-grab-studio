<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="base.css">
  <style>
    .agenda-list {
      display: flex;
      flex-direction: column;
      gap: 16pt;
      margin-top: 16pt;
      padding-left: 24pt;
      border-left: 2pt solid var(--bg-accent);
    }
    .agenda-item {
      font-size: 16pt;
      font-weight: 600;
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="slide">
    <div class="slide-label" data-slot="project-name">PROJECT NAME</div>
    <h2 class="slide-title" data-slot="title">Agenda</h2>

    <div class="agenda-list">
      <div class="agenda-item" data-slot="item-1">Project Overview & Objectives</div>
      <div class="agenda-item" data-slot="item-2">Milestones & Status</div>
      <div class="agenda-item" data-slot="item-3">Timeline</div>
      <div class="agenda-item" data-slot="item-4">Budget</div>
      <div class="agenda-item" data-slot="item-5">Issues & Risks</div>
      <div class="agenda-item" data-slot="item-6">Next Steps</div>
    </div>

    <div class="page-number">01</div>
  </div>
</body>
</html>
