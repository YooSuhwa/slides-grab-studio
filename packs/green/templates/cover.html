<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="base.css">
  <style>
    .cover-layout { display: flex; flex-direction: column; height: 100%; justify-content: center; }
    .cover-title { font-size: 56px; font-weight: 800; color: var(--bg-accent); margin-bottom: 16px; }
    .cover-subtitle { font-size: 20px; font-weight: 600; color: var(--text-primary); margin-bottom: 32px; }

    .author-info { border-top: 2px solid var(--border-light); padding-top: 16px; display: inline-block; }
    .author-name { font-size: 14px; font-weight: 700; }
    .author-role { font-size: 11px; color: var(--text-secondary); }

    .company-logo { position: absolute; top: 40px; right: 40px; font-size: 12px; font-weight: 700; color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="slide">
    <div class="company-logo" data-slot="logo">[Company Logo]</div>
    <div class="cover-layout">
      <div class="slide-label" data-slot="label">Project Status</div>
      <h1 class="cover-title" data-slot="title">Project Aero</h1>
      <div class="cover-subtitle" data-slot="subtitle">Next-Gen Smart Home Appliances</div>

      <div class="author-info">
        <div class="author-name" data-slot="author">Alison Lee</div>
        <div class="author-role" data-slot="role">Head of Product Design</div>
      </div>
    </div>
  </div>
</body>
</html>
