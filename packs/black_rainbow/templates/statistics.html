<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>statistics</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="base.css" />
  <style>
    .stats-head { display:grid; grid-template-columns: 1.15fr .85fr; gap: 24pt; margin-bottom: 20pt; }
    .stats-title { font-size: 27pt; line-height: 1.02; }
    .stats-grid { grid-template-columns: repeat(4, 1fr); }
    .stats-grid .metric-card { min-height: 110pt; padding-top: 16pt; }
    .stats-grid .metric-value { font-size: 28pt; }
  </style>
</head>
<body>
  <main class="slide theme-section">
    <section class="stats-head">
      <div>
        <p class="kicker" data-slot="label">Theme 1 · Sales Data</p>
        <h1 class="slide-title stats-title" data-slot="title">Issues with Variables</h1>
      </div>
      <p class="slide-subtitle" data-slot="body">This template keeps the narrative minimal and lets four equal KPI cards carry the story.</p>
    </section>
    <section class="metric-grid stats-grid">
      <article class="metric-card"><span class="metric-value" data-slot="metric">20%</span><span class="metric-label" data-slot="label">Users</span><p class="note" data-slot="caption" style="margin-top:8pt">Description of key metric</p></article>
      <article class="metric-card"><span class="metric-value" data-slot="metric">20%</span><span class="metric-label" data-slot="label">Users</span><p class="note" data-slot="caption" style="margin-top:8pt">Description of key metric</p></article>
      <article class="metric-card"><span class="metric-value" data-slot="metric">20%</span><span class="metric-label" data-slot="label">Users</span><p class="note" data-slot="caption" style="margin-top:8pt">Description of key metric</p></article>
      <article class="metric-card"><span class="metric-value" data-slot="metric">20%</span><span class="metric-label" data-slot="label">Users</span><p class="note" data-slot="caption" style="margin-top:8pt">Description of key metric</p></article>
    </section>
  </main>
</body>
</html>
