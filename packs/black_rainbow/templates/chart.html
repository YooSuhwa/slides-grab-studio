<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="base.css">
  <style>
    .slide-layout { display: flex; height: 100%; gap: 40pt; }
    .col-left { flex: 0.45; display: flex; flex-direction: column; gap: 16pt; }
    .col-right { flex: 0.55; display: flex; flex-direction: column; justify-content: center; gap: 20pt; }

    .rank-badge { color: #86efac; font-weight: 700; font-size: 14pt; margin-bottom: -8pt; }
    .headline { font-size: 24pt; font-weight: 600; line-height: 1.2; color: var(--text-main); }

    .bar-row { display: flex; align-items: center; gap: 16pt; }
    .bar-label { width: 60pt; font-size: 12pt; font-weight: 600; text-align: right; }
    .bar-track { flex: 1; background: var(--bg-surface); height: 28pt; border-radius: 4pt; overflow: hidden; display: flex; align-items: center; position: relative; }
    .bar-fill { height: 100%; background: var(--text-main); border-radius: 4pt; }
    .bar-value { font-size: 11pt; margin-left: 8pt; font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="slide-layout">
      <div class="col-left">
        <div class="rank-badge" data-slot="rank">Rank 1</div>
        <div class="slide-label" style="color: var(--text-main);" data-slot="category">USER INTERFACE IMPROVEMENTS</div>
        <h2 class="headline" data-slot="headline">Simplifying the user interface for new casual users</h2>
        <p class="slide-body" data-slot="desc">Users have expressed that the current interface is not intuitive, leading to confusion and inefficiencies.</p>
      </div>
      <div class="col-right">
        <div class="slide-label">VOLUME BY CHANNEL</div>
        <div class="chart-container">
          <div class="bar-row">
            <div class="bar-label" data-slot="ch-1">Reddit</div>
            <div class="bar-track"><div class="bar-fill" style="width: 100%;" data-slot="fill-1"></div></div>
            <div class="bar-value" data-slot="val-1">100</div>
          </div>
          <div class="bar-row" style="margin-top: 16pt;">
            <div class="bar-label" data-slot="ch-2">Twitter</div>
            <div class="bar-track"><div class="bar-fill" style="width: 75%;" data-slot="fill-2"></div></div>
            <div class="bar-value" data-slot="val-2">75</div>
          </div>
          <div class="bar-row" style="margin-top: 16pt;">
            <div class="bar-label" data-slot="ch-3">Support</div>
            <div class="bar-track"><div class="bar-fill" style="width: 50%;" data-slot="fill-3"></div></div>
            <div class="bar-value" data-slot="val-3">50</div>
          </div>
          <div class="bar-row" style="margin-top: 16pt;">
            <div class="bar-label" data-slot="ch-4">Forum</div>
            <div class="bar-track"><div class="bar-fill" style="width: 45%;" data-slot="fill-4"></div></div>
            <div class="bar-value" data-slot="val-4">45</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
