<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="theme.css">

  <style>
    .slide-layout { display: flex; height: 100%; gap: 40pt; }
    .title-col { flex: 0.35; display: flex; flex-direction: column; justify-content: flex-start; }

    .grid-col {
      flex: 0.65;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-gap: 32pt 24pt;
      align-content: center;
    }
    .step-item { display: flex; flex-direction: column; gap: 8pt; }
    .step-number {
      width: 32pt;
      height: 32pt;
      border-radius: 50%;
      background-color: #ff7171; /* 네온 핑크/레드 포인트 */
      color: var(--bg-base);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 14pt;
      margin-bottom: 4pt;
    }
    .step-title { font-size: 16pt; font-weight: 700; color: var(--text-main); }
    .step-desc { font-size: 11pt; color: var(--text-muted); line-height: 1.5; }
  </style>
</head>
