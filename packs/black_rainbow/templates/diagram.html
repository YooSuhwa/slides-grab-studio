<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="base.css">
  <style>
    .diagram-layout {
      display: flex;
      height: 100%;
      align-items: center;
      gap: 40pt;
    }
    .circle-container {
      position: relative;
      width: 280pt;
      height: 280pt;
      border-radius: 50%;
      /* 무지개 그라디언트 테두리 구현 */
      background: linear-gradient(var(--bg-base), var(--bg-base)) padding-box,
                  var(--rainbow-gradient) border-box;
      border: 3pt solid transparent;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .center-text { font-size: 24pt; font-weight: 700; text-align: center; }

    /* 4방향 노드 배치 */
    .node {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 8pt;
      font-size: 12pt;
      font-weight: 600;
    }
    .node-icon {
      width: 32pt; height: 32pt;
      border-radius: 50%; background: var(--bg-surface);
      border: 1pt solid var(--border-subtle);
      display: flex; align-items: center; justify-content: center;
    }
    .top-left { top: 10%; left: -30pt; transform: translateX(-100%); }
    .top-right { top: 10%; right: -30pt; transform: translateX(100%); flex-direction: row-reverse; }
    .bottom-left { bottom: 10%; left: -30pt; transform: translateX(-100%); }
    .bottom-right { bottom: 10%; right: -30pt; transform: translateX(100%); flex-direction: row-reverse; }

    .text-content { flex: 1; display: flex; flex-direction: column; gap: 16pt; }
  </style>
</head>
<body>
  <div class="slide">
    <div class="diagram-layout">
      <div class="circle-container">
        <div class="center-text" data-slot="center-title">Voice of Customer</div>

        <div class="node top-left"><span data-slot="label-1">Listen</span><div class="node-icon">💬</div></div>
        <div class="node top-right"><div class="node-icon">✓</div><span data-slot="label-2">Understand</span></div>
        <div class="node bottom-left"><span data-slot="label-4">Respond</span><div class="node-icon">↺</div></div>
        <div class="node bottom-right"><div class="node-icon">✹</div><span data-slot="label-3">Act</span></div>
      </div>

      <div class="text-content">
        <div class="slide-label" data-slot="side-label">GOALS</div>
        <h3 class="slide-title" style="font-size: 24pt;" data-slot="side-title">Foster a customer-centric culture across the organization.</h3>
        <p class="slide-body" data-slot="side-body">The VoC program aims to continuously improve our products and services by actively listening to our customers' needs and feedback...</p>
      </div>
    </div>
  </div>
</body>
</html>
