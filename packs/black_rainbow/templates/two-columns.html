<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="theme.css">
  <link rel="stylesheet" href="base.css">
  <style>
    .slide-layout { display: flex; height: 100%; gap: 40pt; }
    .col-left { flex: 0.5; display: flex; flex-direction: column; gap: 16pt; }
    .col-right { flex: 0.5; display: flex; flex-direction: column; gap: 24pt; justify-content: center; }

    .rank-badge { color: #86efac; font-weight: 700; font-size: 14pt; margin-bottom: -8pt; }
    .headline { font-size: 24pt; font-weight: 600; line-height: 1.2; color: var(--text-main); }

    .metrics-row { display: flex; gap: 16pt; }
    .metric-box { flex: 1; border-left: 2pt solid #c084fc; padding-left: 12pt; }
    .metric-value { font-size: 24pt; font-weight: 700; color: var(--text-main); }
    .metric-label { font-size: 10pt; color: var(--text-muted); text-transform: uppercase; }

    .quote-box { background: var(--bg-surface); padding: 16pt; border-radius: 8pt; border: 1pt solid var(--border-subtle); }
    .quote-text { font-size: 12pt; font-style: italic; margin-bottom: 8pt; color: var(--text-main); }
    .quote-author { font-size: 10pt; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="slide">
    <div class="slide-layout">
      <div class="col-left">
        <div class="rank-badge" data-slot="rank">Rank 1</div>
        <div class="slide-label" style="color: var(--text-main);" data-slot="category">USER INTERFACE IMPROVEMENTS</div>
        <h2 class="headline" data-slot="headline">Simplifying the user interface for new casual users
