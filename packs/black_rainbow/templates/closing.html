<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>closing</title>
  <link rel="stylesheet" href="theme.css" />
  <link rel="stylesheet" href="base.css" />
  <style>
    .closing-layout { display:flex; flex-direction:column; justify-content:space-between; height:100%; }
    .closing-main { max-width: 400pt; padding-top: 22pt; }
    .closing-title { font-size: 54pt; line-height: .9; margin-bottom: 10pt; }
    .closing-subtitle { max-width: 250pt; }
    .contact-row { display:flex; gap: 22pt; }
    .contact-card { padding: 12pt 14pt; min-width: 170pt; background: rgba(255,255,255,.05); border:1px solid var(--border); border-radius: 14pt; }
    .contact-card h3 { margin:0 0 5pt; font-size: 10pt; letter-spacing:.14em; text-transform:uppercase; color: var(--text-muted); }
    .contact-card p { margin:0; font-size: 12pt; }
  </style>
</head>
<body>
  <main class="slide theme-hero">
    <div class="closing-layout">
      <section class="closing-main">
        <p class="kicker" data-slot="label">Closing</p>
        <h1 class="slide-title closing-title" data-slot="title">Questions?</h1>
        <p class="slide-subtitle closing-subtitle" data-slot="subtitle">Use for Q&amp;A, contact information, or a concise closing statement that matches the deck’s dark hero treatment.</p>
      </section>
      <section class="contact-row">
        <div class="contact-card"><h3 data-slot="label">Contact</h3><p data-slot="author">name@company.com</p></div>
        <div class="contact-card"><h3 data-slot="label">Next Step</h3><p data-slot="body">Share feedback or follow-up requests.</p></div>
      </section>
    </div>
  </main>
</body>
</html>
