<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    .slide {
      padding: 50pt 52pt;
    }
    .content-block {
      position: absolute;
      left: 52pt;
      top: 126pt;
      max-width: 320pt;
      display: flex;
      flex-direction: column;
      gap: 20pt;
    }
    .content-block h2 {
      font-size: 33pt;
      line-height: 1.17;
      letter-spacing: -0.04em;
      font-weight: 300;
      color: var(--text-primary);
    }
    .content-block p {
      font-size: 12.8pt;
      line-height: 1.56;
      letter-spacing: -0.005em;
      font-weight: 300;
      color: var(--text-secondary);
    }
  </style>
</head>
<body>
  <div class="slide">
    <p class="deck-label" data-slot="label">Section name</p>
    <div class="content-block">
      <h2 data-slot="title">Ratio is the relation which one quantity bears to another of the same kind.</h2>
      <p data-slot="body">Longer description of slide content. Typically used to provide extra context or nuance to slides. A good description ensures slides can be consumed async without a live presentation.</p>
    </div>
  </div>
</body>
</html>
