<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    .slide {
      padding: 50pt 52pt;
    }
    .quote-wrap {
      position: absolute;
      left: 116pt;
      top: 132pt;
      max-width: 410pt;
      display: flex;
      flex-direction: column;
      gap: 16pt;
    }
    blockquote {
      position: relative;
      padding-top: 18pt;
      font-size: 19pt;
      line-height: 1.48;
      letter-spacing: -0.03em;
      font-weight: 350;
      color: var(--accent);
    }
    blockquote::before {
      content: '“';
      position: absolute;
      top: -10pt;
      left: 0;
      font-size: 36pt;
      line-height: 1;
      font-weight: 700;
      color: var(--accent-mark);
    }
    .author {
      font-size: 12pt;
      line-height: 1.2;
      letter-spacing: 0.02em;
      font-weight: 650;
      color: var(--accent);
      text-transform: uppercase;
    }
  </style>
</head>
<body>
  <div class="slide">
    <p class="deck-label" data-slot="label">Section name</p>
    <div class="quote-wrap">
      <blockquote data-slot="quote">A quote from a customer, user, or other stakeholder that helps back up the points you are trying to make on the previous or upcoming slides.</blockquote>
      <p class="author" data-slot="author">- Jane Doe</p>
    </div>
  </div>
</body>
</html>
