<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    .global-kicker {
      position: absolute;
      top: 50pt;
      left: 52pt;
      z-index: 3;
    }
    .columns {
      position: absolute;
      inset: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
    }
    .column {
      position: relative;
      padding: 122pt 42pt 42pt 52pt;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .column.right {
      padding-left: 40pt;
      padding-right: 52pt;
    }
    .panel-kicker {
      position: absolute;
      top: 50pt;
      left: 52pt;
      font-size: var(--text-label);
      line-height: 1;
      font-weight: 650;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--accent);
    }
    .column.right .panel-kicker {
      left: 40pt;
    }
    .column-content {
      display: flex;
      flex-direction: column;
      gap: 16pt;
      max-width: 248pt;
    }
    .panel-title {
      font-size: 31pt;
      line-height: 1.16;
      letter-spacing: -0.04em;
      font-weight: 300;
      color: var(--text-primary);
    }
    .panel-body {
      font-size: 12.6pt;
      line-height: 1.56;
      font-weight: 300;
      color: var(--text-secondary);
    }
    .media-block {
      width: 100%;
      height: 176pt;
      background: var(--panel-fill);
      box-shadow: inset 0 0 0 1pt rgba(255, 255, 255, 0.02);
    }
    .number-list {
      list-style: none;
      padding: 0;
      margin: 0;
      counter-reset: item;
      display: flex;
      flex-direction: column;
      gap: 14pt;
    }
    .number-list li {
      position: relative;
      padding-left: 18pt;
      font-size: 17pt;
      line-height: 1.14;
      letter-spacing: -0.02em;
      font-weight: 300;
      color: var(--text-primary);
    }
    .number-list li::before {
      counter-increment: item;
      content: counter(item) '.';
      position: absolute;
      left: 0;
      top: 0;
      color: var(--text-primary);
    }
    .check-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 12pt;
    }
    .check-list li {
      position: relative;
      padding-left: 22pt;
      font-size: 14.5pt;
      line-height: 1.14;
      letter-spacing: -0.015em;
      font-weight: 300;
      color: var(--text-primary);
    }
    .check-list li::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0.12em;
      width: 12pt;
      height: 12pt;
      border-radius: 50%;
      border: 1.4pt solid var(--text-primary);
      background: transparent;
    }
    .check-list li.checked::before {
      border-color: var(--accent-mint);
      background: var(--accent-mint);
    }
    .check-list li.checked::after {
      content: '✓';
      position: absolute;
      left: 2.5pt;
      top: -1.3pt;
      font-size: 8.4pt;
      line-height: 1;
      font-weight: 700;
      color: var(--bg-primary);
    }
    blockquote {
      position: relative;
      padding-top: 16pt;
      font-size: 15.5pt;
      line-height: 1.48;
      letter-spacing: -0.02em;
      font-weight: 350;
      color: var(--accent);
    }
    blockquote::before {
      content: '“';
      position: absolute;
      top: -8pt;
      left: 0;
      font-size: 28pt;
      line-height: 1;
      font-weight: 700;
      color: var(--accent-mark);
    }
    blockquote.secondary {
      margin-top: 12pt;
      padding-top: 22pt;
      border-top: 1.5pt dashed var(--divider);
    }
    .quote-author {
      font-size: 11.5pt;
      line-height: 1.2;
      letter-spacing: 0.02em;
      font-weight: 650;
      color: var(--accent);
      text-transform: uppercase;
    }
    li:empty,
    blockquote:empty,
    p:empty,
    h2:empty,
    .media-block:empty {
      display: none;
    }
  </style>
</head>
<body>
  <div class="slide center-divider">
    <p class="deck-label global-kicker optional" data-slot="label">Section name</p>
    <div class="columns">
      <section class="column left">
        <p class="panel-kicker optional" data-slot="label-left"></p>
        <div class="column-content">
          <h2 class="panel-title optional" data-slot="title-left">A triangle whose three sides are equal, is said to be equilateral.</h2>
          <p class="panel-body optional" data-slot="body-left">Longer description of slide content. Typically used to provide extra context or nuance to slides. A good description ensures slides can be consumed async without a live presentation.</p>
          <div class="media-block optional" data-slot="image-left" data-image-placeholder></div>
          <ol class="number-list">
            <li class="optional" data-slot="item-left-1"></li>
            <li class="optional" data-slot="item-left-2"></li>
            <li class="optional" data-slot="item-left-3"></li>
            <li class="optional" data-slot="item-left-4"></li>
          </ol>
          <ul class="check-list">
            <li class="optional" data-slot="check-left-1"></li>
            <li class="optional" data-slot="check-left-2"></li>
            <li class="optional" data-slot="check-left-3"></li>
            <li class="optional" data-slot="check-left-4"></li>
            <li class="optional" data-slot="check-left-5"></li>
          </ul>
          <blockquote class="optional" data-slot="quote-left"></blockquote>
          <p class="quote-author optional" data-slot="author-left"></p>
          <blockquote class="secondary optional" data-slot="quote-left-2"></blockquote>
          <p class="quote-author optional" data-slot="author-left-2"></p>
        </div>
      </section>
      <section class="column right">
        <p class="panel-kicker optional" data-slot="label-right"></p>
        <div class="column-content">
          <h2 class="panel-title optional" data-slot="title-right"></h2>
          <p class="panel-body optional" data-slot="body-right"></p>
          <div class="media-block optional" data-slot="image-right" data-image-placeholder></div>
          <ol class="number-list">
            <li class="optional" data-slot="item-right-1"></li>
            <li class="optional" data-slot="item-right-2"></li>
            <li class="optional" data-slot="item-right-3"></li>
            <li class="optional" data-slot="item-right-4"></li>
          </ol>
          <ul class="check-list">
            <li class="checked optional" data-slot="check-right-1"></li>
            <li class="checked optional" data-slot="check-right-2"></li>
            <li class="optional" data-slot="check-right-3"></li>
            <li class="optional" data-slot="check-right-4"></li>
            <li class="optional" data-slot="check-right-5"></li>
          </ul>
          <blockquote class="optional" data-slot="quote-right"></blockquote>
          <p class="quote-author optional" data-slot="author-right"></p>
          <blockquote class="secondary optional" data-slot="quote-right-2"></blockquote>
          <p class="quote-author optional" data-slot="author-right-2"></p>
        </div>
      </section>
    </div>
  </div>
</body>
</html>
