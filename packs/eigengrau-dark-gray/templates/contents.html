<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    .slide {
      padding: 50pt 52pt 44pt;
    }
    .columns {
      position: absolute;
      left: 52pt;
      right: 52pt;
      top: 88pt;
      bottom: 44pt;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 42pt;
      align-items: center;
    }
    .lead h1 {
      max-width: 250pt;
      font-size: 32pt;
      line-height: 1.18;
      letter-spacing: -0.04em;
      font-weight: 300;
      color: var(--text-primary);
    }
    .agenda {
      list-style: decimal;
      padding-left: 22pt;
      display: flex;
      flex-direction: column;
      gap: 16pt;
    }
    .agenda li {
      font-size: 18pt;
      line-height: 1.18;
      letter-spacing: -0.015em;
      font-weight: 300;
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="slide center-divider">
    <p class="deck-label" data-slot="label">Agenda</p>
    <div class="columns">
      <div class="lead">
        <h1 data-slot="title">Equal circles are those whose diameters are equal.</h1>
      </div>
      <ol class="agenda">
        <li data-slot="item-1">Refresher on problem statement</li>
        <li data-slot="item-2">Update on metrics</li>
        <li data-slot="item-3">Review design proposal</li>
        <li data-slot="item-4">Align on GTM</li>
      </ol>
    </div>
  </div>
</body>
</html>
