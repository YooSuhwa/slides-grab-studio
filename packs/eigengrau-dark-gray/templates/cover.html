<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    .slide {
      padding: 50pt 52pt 48pt;
    }
    .date {
      position: absolute;
      top: 50pt;
      left: 52pt;
    }
    .hero {
      position: absolute;
      left: 52pt;
      right: 72pt;
      bottom: 110pt;
      display: flex;
      flex-direction: column;
      gap: 16pt;
    }
    .hero h1 {
      max-width: 430pt;
      font-size: 67pt;
      line-height: 0.95;
      letter-spacing: -0.045em;
      font-weight: 300;
      color: var(--text-primary);
    }
    .hero p {
      max-width: 360pt;
      font-size: 22pt;
      line-height: 1.3;
      letter-spacing: -0.02em;
      font-weight: 300;
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="slide">
    <p class="deck-label date" data-slot="label">26 June 2024</p>
    <div class="hero">
      <h1 data-slot="title">Eigengrau</h1>
      <p data-slot="subtitle">(n.) The dark gray seen in perfect darkness as a result of signals from the optic nerves</p>
    </div>
  </div>
</body>
</html>
