<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
  <link rel="stylesheet" href="../theme.css">
  <style>
    body {
      background: var(--bg-primary);
      color: var(--text-primary);
    }
    .slide {
      padding: 50pt 52pt;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .date {
      position: absolute;
      top: 50pt;
      left: 52pt;
    }
    h1 {
      font-size: 44pt;
      line-height: 0.98;
      letter-spacing: -0.03em;
      font-weight: 300;
      color: var(--text-primary);
    }
  </style>
</head>
<body>
  <div class="slide">
    <p class="deck-label date" data-slot="label">26 June 2024</p>
    <h1 data-slot="title">Q&amp;A</h1>
  </div>
</body>
</html>
