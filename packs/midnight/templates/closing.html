<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-primary: #0a1628;
    --bg-secondary: #0f1f38;
    --bg-elevated: #152240;
    --text-primary: #e8edf5;
    --text-secondary: #8899b0;
    --accent: #c9a96e;
    --border: rgba(136, 153, 176, 0.12);
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: linear-gradient(135deg, #0f1f38 0%, #0a1628 40%, #07101e 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 64pt 80pt;
    position: relative;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 280pt;
    height: 280pt;
    background: radial-gradient(circle, rgba(201,169,110,0.05) 0%, transparent 60%);
    border-radius: 50%;
  }
  .accent-line {
    width: 32pt;
    height: 2pt;
    background: var(--accent);
    border-radius: 1pt;
    margin-bottom: 24pt;
  }
  h1 {
    font-size: 36pt;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -1pt;
    margin-bottom: 10pt;
    text-shadow: 0 2pt 8pt rgba(0,0,0,0.3);
  }
  p {
    font-size: 14pt;
    color: var(--text-secondary);
  }
</style>
</head>
<body>
  <div class="accent-line"></div>
  <h1>Thank you</h1>
  <p>Any questions?</p>
</body>
</html>
