<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-primary: #0a1628;
    --bg-secondary: #0f1f38;
    --bg-elevated: #152240;
    --text-primary: #e8edf5;
    --text-secondary: #8899b0;
    --accent: #c9a96e;
    --border: rgba(136, 153, 176, 0.12);
  }
  body {
    width: 720pt;
    height: 405pt;
    font-family: 'Pretendard', -apple-system, sans-serif;
    background: linear-gradient(170deg, #0f1f38 0%, #0a1628 50%, #07101e 100%);
    display: flex;
    flex-direction: column;
    justify-content: center;
    padding: 56pt 80pt;
    position: relative;
    overflow: hidden;
  }
  body::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 1pt;
    background: linear-gradient(90deg, transparent, rgba(201,169,110,0.15), transparent);
  }
  h2 {
    font-size: 28pt;
    font-weight: 800;
    color: var(--text-primary);
    letter-spacing: -0.5pt;
    margin-bottom: 8pt;
    line-height: 1.2;
  }
  .accent-bar {
    width: 32pt;
    height: 2pt;
    background: var(--accent);
    border-radius: 1pt;
    margin-bottom: 24pt;
  }
  p {
    font-size: 13pt;
    line-height: 1.7;
    color: var(--text-secondary);
    max-width: 500pt;
  }
</style>
</head>
<body>
  <h2>Section Title</h2>
  <div class="accent-bar"></div>
  <p>Quick description about the section. Use this slide for general content that needs a clear title and readable body text area.</p>
</body>
</html>
